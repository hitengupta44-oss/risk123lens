<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiskLens — Health Form</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .form-page { padding: 6rem 1.5rem 4rem; }
    .form-container { max-width: 680px; margin: 0 auto; }
    .form-header { margin-bottom: 2rem; }
    .form-header h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; }
    .form-header p { color: var(--text-dim); font-size: 0.92rem; margin-top: 0.4rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.4rem; }
    .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.25rem; }
    @media(max-width:600px){ .fields-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-dot"></div>
    </div>
    <p>Analysing your health profile…</p>
  </div>

  <nav>
    <a class="nav-logo" href="index.html">Risk<span>Lens</span></a>
    <div class="nav-right">
      <div class="nav-user">
        <img id="user-photo" src="" alt="" style="display:none"/>
        <span id="user-name"></span>
      </div>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </nav>

  <div class="page form-page">
    <div class="form-container">
      <div class="form-header">
        <h1>Health Intake Form</h1>
        <p>Answer all questions honestly for the most accurate risk assessment.</p>
      </div>

      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>

      <form id="health-form">

        <div class="section-label">Basic Info</div>
        <div class="fields-grid">
          <div class="form-group">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="age"
              min="1" max="120" placeholder="e.g. 35" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-control" id="Gender" required>
              <option value="">Select…</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>

        <div class="section-label">Lifestyle</div>
        <div class="fields-grid">
          <div class="form-group">
            <label class="form-label">Smoking</label>
            <select class="form-control" id="Smoking" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Alcohol</label>
            <select class="form-control" id="Alcohol" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Physical Activity</label>
            <select class="form-control" id="PhysicalActivity" required>
              <option value="">Select…</option>
              <option value="Low">Low</option>
              <option value="Moderate">Moderate</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Diet Quality</label>
            <select class="form-control" id="DietQuality" required>
              <option value="">Select…</option>
              <option value="Poor">Poor</option>
              <option value="Average">Average</option>
              <option value="Good">Good</option>
            </select>
          </div>
        </div>

        <div class="section-label">Vitals</div>
        <div class="fields-grid">
          <div class="form-group">
            <label class="form-label">Blood Pressure</label>
            <select class="form-control" id="BloodPressure" required>
              <option value="">Select…</option>
              <option value="Normal">Normal</option>
              <option value="Elevated">Elevated</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Sugar Level</label>
            <select class="form-control" id="SugarLevel" required>
              <option value="">Select…</option>
              <option value="Normal">Normal</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div class="section-label">Symptoms</div>
        <div class="fields-grid">
          <div class="form-group">
            <label class="form-label">Frequent Urination</label>
            <select class="form-control" id="FrequentUrination" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Excessive Thirst</label>
            <select class="form-control" id="ExcessiveThirst" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fatigue</label>
            <select class="form-control" id="Fatigue" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Chest Pain</label>
            <select class="form-control" id="ChestPain" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Swelling in Ankles</label>
            <select class="form-control" id="SwellingAnkles" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Wheezing</label>
            <select class="form-control" id="Wheezing" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Breathlessness</label>
            <select class="form-control" id="Breathlessness" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Cough</label>
            <select class="form-control" id="Cough" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Pale Skin</label>
            <select class="form-control" id="PaleSkin" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Weight Loss</label>
            <select class="form-control" id="WeightLoss" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Dizziness</label>
            <select class="form-control" id="Dizziness" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>

        <div class="section-label">Family History</div>
        <div class="fields-grid">
          <div class="form-group">
            <label class="form-label">Diabetes in Family</label>
            <select class="form-control" id="FamilyHistoryDiabetes" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Heart Disease in Family</label>
            <select class="form-control" id="FamilyHistoryHeart" required>
              <option value="">Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn-primary w-full"
            style="font-size:1.05rem;padding:1rem;">
            Analyse My Health →
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { onAuth, logOut } from './js/firebase.js';

    // ── CORRECT BACKEND URL (all lowercase) ───────────────────────────────────
    const API = 'https://beastzzz-risk123lens.hf.space/predict';

    const FIELDS = [
      'Gender','Smoking','Alcohol','PhysicalActivity','DietQuality',
      'BloodPressure','SugarLevel','FrequentUrination','ExcessiveThirst',
      'Fatigue','ChestPain','SwellingAnkles','Wheezing','Breathlessness',
      'Cough','PaleSkin','WeightLoss','Dizziness',
      'FamilyHistoryDiabetes','FamilyHistoryHeart'
    ];
    const TOTAL = FIELDS.length + 1; // +1 for age

    // ── Auth guard ────────────────────────────────────────────────────────────
    onAuth(user => {
      if (!user) { window.location.href = 'login.html'; return; }
      const photo = document.getElementById('user-photo');
      const name  = document.getElementById('user-name');
      if (user.photoURL) { photo.src = user.photoURL; photo.style.display = 'block'; }
      name.textContent = user.displayName || user.email;
    });

    // ── Sign out ──────────────────────────────────────────────────────────────
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await logOut();
      window.location.href = 'login.html';
    });

    // ── Progress bar ──────────────────────────────────────────────────────────
    function updateProgress() {
      let filled = document.getElementById('age').value ? 1 : 0;
      FIELDS.forEach(id => {
        if (document.getElementById(id)?.value) filled++;
      });
      const pct = Math.round((filled / TOTAL) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
    }
    document.getElementById('health-form').addEventListener('change', updateProgress);
    document.getElementById('age').addEventListener('input', updateProgress);

    // ── Submit ────────────────────────────────────────────────────────────────
    document.getElementById('health-form').addEventListener('submit', async e => {
      e.preventDefault();

      // Validate age
      const age = parseInt(document.getElementById('age').value);
      if (!age || age < 1 || age > 120) {
        alert('Please enter a valid age between 1 and 120.');
        return;
      }

      // Validate all fields filled
      const empty = FIELDS.filter(id => !document.getElementById(id)?.value);
      if (empty.length > 0) {
        alert('Please fill all fields before submitting.');
        return;
      }

      // Build request body — values are already correct from select option values
      const body = { age };
      FIELDS.forEach(id => {
        body[id] = document.getElementById(id).value;
      });

      // Show loader
      document.getElementById('loader').classList.add('show');

      try {
        const res = await fetch(API, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(
            `API returned ${res.status}. ` +
            (errData.detail || 'Please check all fields and try again.')
          );
        }

        const data = await res.json();
        localStorage.setItem('risklens_report', JSON.stringify(data));
        window.location.href = 'report.html';

      } catch (err) {
        document.getElementById('loader').classList.remove('show');
        alert('Something went wrong:\n\n' + err.message);
      }
    });
  </script>
</body>
</html>
